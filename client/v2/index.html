<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧱 LEGO Price Analyzer - Dealabs x Vinted</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="header-container">
        <div class="logo">
          <span class="logo-icon">🧱</span>
          <span class="logo-text">LEGO Price Analyzer</span>
          <span class="logo-subtitle">Dealabs – Vinted</span>
        </div>
        <div class="auth-buttons">
          <button class="btn-login">Login</button>
          <button class="btn-signup">Sign Up</button>
        </div>
      </div>
    </header>

    <!-- SEARCH SECTION -->
    <section class="search-section">
      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Search LEGO sets by name or reference..." />
        <button class="search-btn">🔍</button>
      </div>
    </section>

    <!-- FILTERS SECTION -->
    <section class="filters-section">
      <!-- All Filters -->
      <div class="filters-wrapper">
        <button class="quick-filter-btn" id="filterBestDiscount" title="Discount > 50%">
          🏷️ Best Discount
        </button>
        <button class="quick-filter-btn" id="filterMostCommented" title="Comments > 15">
          💬 Most Commented
        </button>
        <button class="quick-filter-btn" id="filterHotDeals" title="Temperature > 100">
          🔥 Hot Deals
        </button>
        <button class="quick-filter-btn" id="filterFavorites" title="My favorite deals">
          ❤️ My Favorites
        </button>
        <div class="filter-group">
          <label>Sort By</label>
          <select id="sort-select" class="filter-select">
            <option value="profit-desc">Highest Profit</option>
            <option value="price-asc">Cheaper</option>
            <option value="price-desc">Expensive</option>
            <option value="date-asc">Recently published</option>
            <option value="date-desc">Anciently published</option>
          </select>
        </div>
        <button class="btn-apply-filters">Apply Filters</button>
        <button class="btn-reset-filters">Reset</button>
      </div>
    </section>

    <!-- RESULTS HEADER -->
    <section class="results-header">
      <h2>Results (<span id="resultsCount">6</span>)</h2>
      <button class="btn-export">📥 Export Saved (0)</button>
    </section>

    <!-- RESULTS SECTION -->
    <section id="deals" class="deals-section"></section>

    <!-- PAGINATION -->
    <section class="pagination-section">
      <div id="page">
        <label for="page-select">Go to page:</label>
        <select name="page" id="page-select"></select>
      </div>
      <div id="show">
        <label for="show-select">Show:</label>
        <select name="show" id="show-select">
          <option value="6">6</option>
          <option value="12">12</option>
          <option value="24">24</option>
        </select>
      </div>
    </section>

    <!-- HIDDEN SECTIONS (kept for compatibility) -->
    <section id="lego" style="display:none;">
      <h2>Lego sets</h2>
      <div>
        <label>Lego set id:</label>
        <select id="lego-set-id-select"></select> 
      </div>
    </section>
    <section id="indicators" style="display:none;">
      <h2>Indicators</h2>
      <div>
        <span>Number of deals</span>
        <span id="nbDeals">0</span>
      </div>
      <div>
        <span>Number of sales</span>
        <span id="nbSales">0</span>
      </div>
      <div>
        <span>p5 sales price value</span>
        <span id="p5SalesPrice">0</span>
      </div>
      <div>
        <span>p25 sales price value</span>
        <span id="p25SalesPrice">0</span>
      </div>
      <div>
        <span>p50 sales price value</span>
        <span id="p50SalesPrice">0</span>
      </div>
      <div>
        <span>Average sales price value</span>
        <span id="averageSalesPrice">0</span>
      </div>
      <div>
        <span>Lifetime value</span>
        <span id="lifetimeValue">0 days</span>
      </div>
    </section>
    <section id="sales" style="display:none;"></section>

    <script type="text/javascript" charset="UTF-8" src="utils.js"></script>
    <script type="text/javascript" charset="UTF-8" src="portfolio.js"></script>
  </body>
</html>
